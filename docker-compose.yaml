services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - anomaly_net

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - anomaly_net

  kafka-setup:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - kafka
    command: >
      bash -c "
        echo 'Waiting for Kafka to be ready...'
        cub kafka-ready -b kafka:29092 1 60
        echo 'Creating Kafka topics...'
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic raw_transactions
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1 --topic alarms
        echo 'Topics created successfully.'
      "
    networks:
      - anomaly_net

  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - anomaly_net

  jobmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=jobmanager
      - PYTHONPATH=/app
      - KAFKA_BROKER=kafka:29092
    volumes:
      - .:/app
    networks:
      - anomaly_net

  taskmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=jobmanager
      - TASK_MANAGER_NUMBER_OF_TASK_SLOTS=4
      - PYTHONPATH=/app
      - KAFKA_BROKER=kafka:29092
    volumes:
      - .:/app
    networks:
      - anomaly_net

  flink-job-submitter:
    build:
      context: .
      dockerfile: Dockerfile.flink
    depends_on:
      - jobmanager
      - taskmanager
      - kafka-setup
    command: >
      bash -c "
        echo 'Waiting for Flink JobManager to be ready...'
        while ! curl -s http://jobmanager:8081/overview | grep -q '\"taskmanagers\":1'; do
          sleep 2;
        done;
        echo 'Submitting Flink Job...'
        flink run -d -py /app/src/flink_pipeline/job.py
      "
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
    networks:
      - anomaly_net

  simulator:
    build:
      context: .
      dockerfile: Dockerfile.app
    depends_on:
      - kafka-setup
    command: python -m src.simulator.runner
    environment:
      - PYTHONPATH=/app
      - KAFKA_BROKER=kafka:29092
    networks:
      - anomaly_net

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.app
    ports:
      - "8501:8501"
    depends_on:
      - kafka-setup
      - mongo
    environment:
      - KAFKA_BROKER=kafka:29092
      - PYTHONPATH=/app
      - MONGO_URI=mongodb://mongo:27017
    command: streamlit run src/ui/dashboard.py
    networks:
      - anomaly_net

  alarm_store:
    build:
      context: .
      dockerfile: Dockerfile.app
    depends_on:
      - kafka-setup
      - mongo
    command: python -m src.persistence.alarm_store
    environment:
      - PYTHONPATH=/app
      - KAFKA_BROKER=kafka:29092
      - MONGO_URI=mongodb://mongo:27017
    networks:
      - anomaly_net

networks:
  anomaly_net:
    driver: bridge

volumes:
  mongo_data: